<div class="main-page-wrapper">
    <app-aside-menu></app-aside-menu>
    <div class="dashboard-body">
        <div class="position-relative">

            <router-outlet name="dashboard" />

        </div>
    </div>
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen modal-dialog-centered">
            <div class="container">
                <div class="remove-account-popup text-center modal-content">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="assets/dashboard-images/icon/icon_22.svg" alt="" class="lazy-img m-auto">
                    <h2>Confirmer l'action ?</h2>
        
                    <div class="button-group d-inline-flex justify-content-center align-items-center pt-15">
                        <a href="javascript:void(0);" class="confirm-btn fw-500 tran3s me-3">Confirmer</a>
                        <button type="button" class="btn-close fw-500 ms-3" data-bs-dismiss="modal" aria-label="Close">Annuler</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="scroll-top" [ngStyle]="{display: scrollVisible ? 'block' : 'none'}" (click)="scrollToTop()">
        <i class="bi bi-arrow-up-short"></i>
    </button>
</div>
