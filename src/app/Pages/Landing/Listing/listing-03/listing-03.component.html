<app-navbar-7></app-navbar-7>
<div class="property-listing-six bg-pink-two pt-110 md-pt-80 pb-170 xl-pb-120 mt-150 xl-mt-120">
    <div class="container">
        <div class="search-wrapper-one layout-one bg position-relative mb-75 md-mb-50">
            <div class="bg-wrapper border-layout">
                <form action="javascript:void(0);">
                    <div class="row gx-0 align-items-center">
                        <div class="col-xl-3 col-lg-4">
                            <div class="input-box-one border-left">
                                <div class="label">I’m looking to...</div>
                                <ng-select [items]="options" bindLabel="label" bindValue="value" [placeholder]="'Buy Apartments'">
                                    <ng-option *ngFor="let option of options" [value]="option.value">{{ option.label }}</ng-option>
                                </ng-select>
                            </div>
                        </div>
                        <div class="col-xl-3 col-lg-4">
                            <div class="input-box-one border-left">
                                <div class="label">Location</div>
                                <ng-select class="" [items]="locations" bindLabel="label" bindValue="value" [placeholder]="'Dhanmondi, Dhaka'">
                                    <ng-option *ngFor="let location of locations" [value]="location.value">{{ location.label }}</ng-option>
                                </ng-select>
                            </div>
                        </div>
                        <div class="col-xl-3 col-lg-4">
                            <div class="input-box-one border-left border-lg-0">
                                <div class="label">Price Range</div>
                                <ng-select [items]="priceRanges" bindLabel="label" bindValue="value" [placeholder]="'$10,000 - $200,000'">
                                    <ng-option *ngFor="let range of priceRanges" [value]="range.value">{{ range.label }}</ng-option>
                                </ng-select>
                            </div>
                        </div>
                        <div class="col-xl-3">
                            <div class="input-box-one lg-mt-20">
                                <div class="d-flex align-items-center">
                                    <a href="javascript:void(0);" data-bs-toggle="modal" data-bs-target="#advanceFilterModal" class="search-modal-btn sm tran3s text-uppercase fw-500 d-inline-flex align-items-center me-3">
                                        <i class="fa-light fa-sliders-up"></i>
                                    </a>
                                    <button class="fw-500 text-uppercase tran3s search-btn">Search</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="listing-header-filter d-sm-flex justify-content-between align-items-center mb-40 lg-mb-30">
            <div>Showing <span class="color-dark fw-500">1–9</span> of <span class="color-dark fw-500">170</span> results</div>
            <div class="d-flex align-items-center xs-mt-20">
                <div class="short-filter d-flex align-items-center">
                    <div class="fs-16 me-2">Short by:</div>
                    <ng-select [items]="short" bindLabel="label" bindValue="value" [placeholder]="'Newest'">
                        <ng-option *ngFor="let range of short" [value]="range.value">{{ range.label }}</ng-option>
                    </ng-select>
                </div>
                <a routerLink="/listing_04" class="tran3s layout-change rounded-circle ms-auto ms-sm-3" data-bs-toggle="tooltip" title="Switch To List View"><i class="fa-regular fa-bars"></i></a>
            </div>
        </div>
        <div class="row gx-xxl-5">
            <div *ngFor="let property of listings; let i = index" class="col-lg-4 col-md-6 d-flex mb-50 fadeInUp" data-aos="fade-up" [attr.data-aos-delay]="(i % 3) * 100">
                <div class="listing-card-one border-25 h-100 w-100">
                    <div class="img-gallery p-15">
                        <div class="position-relative border-25 overflow-hidden">
                            <div class="tag border-25" [ngClass]="{
       'sale': property.tag === 'FOR SELL',
       'rent': property.tag === 'FOR RENT'
     }">
                                {{ property.tag }}
                            </div>

                            <a href="javascript:void(0);" class="fav-btn tran3s"><i class="fa-light fa-heart"></i></a>
                            <div [id]="property.id" class="carousel slide">
                                <div class="carousel-indicators">
                                    <button *ngFor="let image of property.images; let j = index" type="button" [attr.data-bs-target]="'#' + property.id" [attr.data-bs-slide-to]="j" [class.active]="j === 0" [attr.aria-label]="'Slide ' + (j + 1)"></button>
                                </div>
                                <div class="carousel-inner">
                                    <div *ngFor="let image of property.images; let j = index" class="carousel-item" [class.active]="j === 0" data-bs-interval="1000000">
                                        <a href="javascript:void(0);" class="d-block"><img [src]="image" class="w-100" alt="..."></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="property-info p-25">
                        <a routerLink="/listing_details_03" class="title tran3s">{{ property.title }}</a>
                        <div class="address">{{ property.address }}</div>
                        <ul class="style-none feature d-flex flex-wrap align-items-center justify-content-between">
                            <li *ngFor="let feature of property.features" class="d-flex align-items-center">
                                <img [attr.src]="'assets/images/icon/' + feature.icon" alt="" class="lazy-img icon me-2">
                                <span class="fs-16">{{ feature.label }}</span>
                            </li>
                        </ul>
                        <div class="pl-footer top-border d-flex align-items-center justify-content-between">
                            <strong class="price fw-500 color-dark" [innerHTML]="property.price"></strong>
                            <a routerLink="/listing_details_03" class="btn-four rounded-circle"><i class="bi bi-arrow-up-right"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="pt-50 md-pt-20 text-center">
            <ul class="pagination-two d-inline-flex align-items-center justify-content-center style-none">
                <li><a href="javascript:void(0);"><i class="fa-regular fa-chevron-left"></i></a></li>
                <li class="active"><a href="javascript:void(0);">1</a></li>
                <li><a href="javascript:void(0);">2</a></li>
                <li><a href="javascript:void(0);">3</a></li>
                <li><span>...</span></li>
                <li><a href="javascript:void(0);">13</a></li>
                <li><a href="javascript:void(0);"><i class="fa-regular fa-chevron-right"></i></a></li>
            </ul>
        </div>
    </div>
</div>
<app-fancy-banner-two></app-fancy-banner-two>
<app-footer-5></app-footer-5>
<app-advance-filter-modal></app-advance-filter-modal>
