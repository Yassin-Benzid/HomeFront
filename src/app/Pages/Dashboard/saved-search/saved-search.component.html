<app-dashboard-navbar [Title]="'Zones touristiques'"></app-dashboard-navbar>

<div class="container mt-3">

  <!-- HEADER -->
  <div class="d-flex justify-content-between mb-3">
    <h3>Gestion des zones</h3>

    <button class="btn btn-primary" (click)="openModal()">
      + Ajouter zone
    </button>
  </div>

  <!-- MESSAGES -->
  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- ================= LIST ================= -->
  <div class="row">

    <div class="col-md-4 mb-3" *ngFor="let z of zones">

      <div class="card p-2">

        <!-- IMAGE -->
        <img *ngIf="z.image"
             [src]="getImageUrl(z.image)"
             class="img-fluid mb-2 rounded">

        <h5>{{ z.nom }}</h5>
        <p>{{ z.ville }}</p>

        <button class="btn btn-warning btn-sm"
                (click)="openModal(z)">
          Modifier
        </button>

        <button class="btn btn-danger btn-sm mt-1"
                (click)="deleteZone(z.idzone)">
          Supprimer
        </button>

      </div>

    </div>

  </div>

</div>

<!-- ================= MODAL ================= -->
<div class="modal d-block" *ngIf="showModal"
     style="background: rgba(0,0,0,0.5)">

  <div class="modal-dialog">
    <div class="modal-content p-3 bg-white card-box border-20">

      <h4>Informations zone</h4>

      <input [(ngModel)]="form.nom"
             placeholder="Nom"
             class="form-control mb-2">

      <input [(ngModel)]="form.ville"
             placeholder="Ville"
             class="form-control mb-2">

      <textarea [(ngModel)]="form.description"
                placeholder="Description"
                class="form-control mb-2"></textarea>

      <input type="number"
             [(ngModel)]="form.latitude"
             placeholder="Latitude"
             class="form-control mb-2">

      <input type="number"
             [(ngModel)]="form.longitude"
             placeholder="Longitude"
             class="form-control mb-2">

      <!-- IMAGE -->
      <input type="file" class="form-control mb-2"
             (change)="onFileChange($event)">

      <img *ngIf="imagePreview"
           [src]="imagePreview"
           class="img-fluid mb-2 rounded">

      <!-- ACTIONS -->
      <div class="d-flex justify-content-end gap-2 mt-3">

        <button class="btn btn-secondary"
                (click)="closeModal()">
          Annuler
        </button>

        <button class="btn btn-success"
                (click)="saveZone()">
          Enregistrer
        </button>

      </div>

    </div>
  </div>
</div>
