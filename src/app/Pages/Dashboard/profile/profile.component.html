<app-dashboard-navbar [Title]="'Profil admin'"></app-dashboard-navbar>

<h2 class="main-title d-block d-lg-none">Profil admin</h2>

<div class="bg-white card-box border-20">

  <!-- ================= POPUPS ================= -->

  <!-- SUCCESS -->
  <div *ngIf="successMessage" class="alert alert-success mt-3">
    {{ successMessage }}
  </div>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="alert alert-danger mt-3">
    {{ errorMessage }}
  </div>

  <!-- ================= AVATAR ================= -->
  <div class="user-avatar-setting d-flex align-items-center mb-30">

    <img [src]="imageSrc || 'assets/dashboard-images/avatar_02.jpg'"
         class="lazy-img user-img">

    <div class="upload-btn position-relative tran3s ms-4 me-3">
      Importer une photo
      <input type="file" (change)="onFileChange($event)">
    </div>

    <button type="button"
            class="delete-btn tran3s"
            (click)="clearForm()">
      Réinitialiser
    </button>

  </div>

  <!-- ================= FORM ================= -->
  <div class="row">

    <div class="col-sm-6">
      <div class="dash-input-wrapper mb-30">
        <label>Nom</label>
        <input type="text" [(ngModel)]="user.nom">
      </div>
    </div>

    <div class="col-sm-6">
      <div class="dash-input-wrapper mb-30">
        <label>Prénom</label>
        <input type="text" [(ngModel)]="user.prenom">
      </div>
    </div>

    <div class="col-sm-6">
      <div class="dash-input-wrapper mb-30">
        <label>E-mail</label>
        <input type="email" [(ngModel)]="user.email">
      </div>
    </div>

    <div class="col-sm-6">
      <div class="dash-input-wrapper mb-30">
        <label>Téléphone</label>
        <input type="tel" [(ngModel)]="user.telephone">
      </div>
    </div>

    <div class="col-sm-6">
      <div class="dash-input-wrapper mb-30">
        <label>Nouveau mot de passe</label>
        <input type="password" [(ngModel)]="user.password">
      </div>
    </div>

  </div>
</div>

<!-- ================= ACTIONS ================= -->
<div class="button-group d-inline-flex align-items-center mt-30">

  <button class="dash-btn-two tran3s me-3"
          (click)="saveProfile()">
    Enregistrer
  </button>

  <button class="dash-cancel-btn tran3s"
          (click)="clearForm()">
    Annuler
  </button>

</div>
