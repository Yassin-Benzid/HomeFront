<app-dashboard-navbar [Title]="'Fiche hôtel'"></app-dashboard-navbar>

<div class="bg-white card-box border-20">

  <!-- MESSAGE -->
  <div *ngIf="message" class="alert alert-info">
    {{ message }}
  </div>

  <h4 class="mb-3">Informations hôtel</h4>

  <div class="row">

    <div class="col-md-6">
      <label>Nom de l’hôtel</label>
      <input type="text"
             class="form-control mb-2"
             [(ngModel)]="hotelForm.nom">
    </div>

    <div class="col-md-6">
      <label>Ville</label>
      <input type="text"
             class="form-control mb-2"
             [(ngModel)]="hotelForm.ville">
    </div>

    <div class="col-md-6">
      <label>Téléphone</label>
      <input type="text"
             class="form-control mb-2"
             [(ngModel)]="hotelForm.telephone">
    </div>

    <div class="col-md-6">
      <label>Nombre d’étoiles</label>
      <input type="number"
             class="form-control mb-2"
             [(ngModel)]="hotelForm.nb_Etoiles">
    </div>

    <div class="col-md-6">
      <label>Latitude</label>
      <input type="number"
             class="form-control mb-2"
             [(ngModel)]="hotelForm.latitude">
    </div>

    <div class="col-md-6">
      <label>Longitude</label>
      <input type="number"
             class="form-control mb-2"
             [(ngModel)]="hotelForm.longitude">
    </div>

  </div>

  <!-- IMAGE UPLOAD (OPTIONNEL FRONT ONLY) -->
  <div class="mt-3">
    <label>Images</label>
    <input type="file"
           class="form-control"
           multiple
           (change)="onFileChange($event)">

    <div class="mt-2 d-flex flex-wrap gap-2">
      <div *ngFor="let file of uploadedFiles" class="border p-2 rounded">
        {{ file.name }}
        <a href="javascript:void(0)" (click)="removeFile(file)">
          supprimer
        </a>
      </div>
    </div>
  </div>

       <!-- ================= CHAMBRES ================= -->
<div class="mt-4">

  <h4>Chambres</h4>

  <button class="btn btn-primary mb-3" (click)="addChambre()">
    Ajouter chambre
  </button>

  <div *ngFor="let c of chambres; let i = index"
       class="border p-3 mb-2">

    <input [(ngModel)]="c.numero"
           class="form-control mb-2"
           placeholder="Numéro">

    <input [(ngModel)]="c.capacite"
           type="number"
           class="form-control mb-2"
           placeholder="Capacité">

    <input [(ngModel)]="c.prix_Nuit"
           type="number"
           class="form-control mb-2"
           placeholder="Prix / nuit">

    <select [(ngModel)]="c.etat"
            class="form-control mb-2">
      <option value="disponible">Disponible</option>
      <option value="occupée">Occupée</option>
    </select>

    <button class="btn btn-danger btn-sm"
            (click)="removeChambre(i)">
      Supprimer
    </button>

  </div>

</div>


  <!-- BUTTONS -->
  <div class="mt-4 d-flex gap-2">

    <button class="btn btn-success"
            (click)="saveHotel()">
      Enregistrer
    </button>

    <a routerLink="/hotels" class="btn btn-secondary">
      Annuler
    </a>

  </div>

</div>
