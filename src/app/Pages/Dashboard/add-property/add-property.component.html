<app-dashboard-navbar [Title]="'Gestion hôtels'"></app-dashboard-navbar>

<div class="container mt-3">
  <!-- HEADER -->
  <div class="d-flex justify-content-between mb-3">
    <h3>Gestion des hôtels</h3>
    <button class="btn btn-primary" (click)="openAddModal()">
      + Ajouter hôtel
    </button>
  </div>

  <!-- MESSAGE -->
  <div *ngIf="message" class="alert alert-info">
    {{ message }}
  </div>

  <!-- ================= LIST ================= -->
  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let h of hotels">
      <div class="card p-2 h-100 shadow-sm">

        <img *ngIf="h.images?.length"
             [src]="getImageUrl(h.images[0])"
             class="img-fluid mb-2 rounded">

        <h5 class="mb-1">{{ h.nom }}</h5>
        <p class="text-muted small mb-2">{{ h.ville }}</p>
        <p class="small mb-3">
          <span class="badge bg-light text-dark border">
            {{ h.nb_Chambres ?? h.nb_chambres ?? h['nb-chambres'] ?? 0 }} chambre(s)
          </span>
        </p>

        <div class="d-flex gap-2 mt-auto">
          <button class="btn btn-sm btn-outline-secondary" (click)="openEditModal(h)">
            ✏️ Modifier
          </button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ================= MODAL HÔTEL ================= -->
<div class="modal d-block" *ngIf="showModal"
     style="background: rgba(0,0,0,0.5); z-index: 1050;">
  <div class="modal-dialog modal-lg">
    <div class="modal-content p-3 bg-white card-box border-20">
      <h4 class="mb-3">Informations hôtel</h4>

      <div class="row">

        <div class="col-md-6">
          <label class="form-label">Nom de l'hôtel</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="hotelForm.nom">
        </div>

        <div class="col-md-6">
          <label class="form-label">Ville</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="hotelForm.ville">
        </div>

        <div class="col-md-6">
          <label class="form-label">Téléphone</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="hotelForm.telephone">
        </div>

        <div class="col-md-6">
          <label class="form-label">Nombre d'étoiles</label>
          <input type="number" min="1" max="5" class="form-control mb-2"
                 [(ngModel)]="hotelForm.nb_Etoiles">
        </div>

        <div class="col-md-6">
          <label class="form-label">Nombre de chambres</label>
          <input type="number" min="0" class="form-control mb-2"
                 name="chambre"
                 [(ngModel)]="hotelForm.nb_Chambres">
        </div>

        <div class="col-md-6">
          <label class="form-label">Latitude</label>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="hotelForm.latitude">
        </div>

        <div class="col-md-6">
          <label class="form-label">Longitude</label>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="hotelForm.longitude">
        </div>

      </div>

      <div class="mt-3">
        <label class="form-label">Images</label>
        <input type="file" multiple class="form-control mb-2"
               (change)="onFileChange($event)">

        <div class="d-flex flex-wrap gap-2 mt-2">
          <div *ngFor="let file of uploadedFiles"
               class="border p-2 rounded small">
            {{ file.name }}
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-3">
        <button class="btn btn-secondary" (click)="closeModal()">Annuler</button>
        <button class="btn btn-primary" (click)="saveHotel()">Enregistrer</button>
      </div>

    </div>
  </div>
</div>
