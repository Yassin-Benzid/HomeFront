<app-dashboard-navbar [Title]="'Avis & commentaires'"></app-dashboard-navbar>

<h2 class="main-title d-block d-lg-none">Avis & commentaires</h2>

<div class="bg-white card-box border-20">
    <div class="d-sm-flex justify-content-between align-items-center mb-25">
        <div>
            <h4 class="dash-title-three mb-1">Modération</h4>
            <p class="m0 fs-16">Gérez les avis sur hôtels, agences et zones touristiques.</p>
        </div>
        <span class="badge text-bg-light">{{ reviews.length }} avis</span>
    </div>
    <!-- TODO backend: brancher cette vue sur GET /reviews et PATCH /reviews/:id/status -->
    <div class="border rounded-4 p-4 mb-20" *ngFor="let review of reviews">
        <div class="d-sm-flex justify-content-between mb-2">
            <div>
                <h5 class="mb-1">{{ review.author }}</h5>
                <div class="fs-16">{{ review.target }}</div>
            </div>
            <div class="text-sm-end mt-2 mt-sm-0">
                <div class="fw-500">{{ review.rating }}</div>
                <span class="badge text-bg-light">{{ review.status }}</span>
            </div>
        </div>
        <p class="fs-18 mt-20 mb-15">{{ review.comment }}</p>
        <div class="d-flex justify-content-between align-items-center">
            <span class="fs-16">{{ review.date }}</span>
            <div class="d-flex gap-2">
                <a href="javascript:void(0);" class="dash-btn-one">Publier</a>
                <a href="javascript:void(0);" class="dash-btn-one">Répondre</a>
            </div>
        </div>
    </div>
</div>
