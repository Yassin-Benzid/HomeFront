<app-dashboard-navbar [Title]="'Hôtels & chambres'"></app-dashboard-navbar>

<div class="bg-white card-box border-20">

  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="d-flex justify-content-between mb-3">
    <div>
      <h4>Liste des hôtels</h4>
    </div>

    <a routerLink="/fiche-hotel" class="btn btn-primary">
      Ajouter hôtel
    </a>
  </div>

  <table class="table table-hover">
    <thead>
      <tr>
        <th>Hôtel</th>
        <th>Ville</th>
        <th>Manager</th>
        <th>Chambres</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let hotel of hotels">

        <td>{{ hotel.nom }}</td>
        <td>{{ hotel.ville }}</td>
        <td>{{ hotel.hotelManager?.nom }}</td>
        <td>{{ hotel.chambres?.length }}</td>

        <td>

          <button class="btn btn-danger btn-sm"
                  (click)="deleteHotel(hotel.idhotel)">
            Supprimer
          </button>
        </td>

      </tr>
    </tbody>
  </table>

</div>
