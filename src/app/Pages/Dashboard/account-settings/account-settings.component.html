<app-dashboard-navbar [Title]="'Agences voitures'"></app-dashboard-navbar>

<div class="bg-white card-box border-20">

  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="d-flex justify-content-between mb-3">
    <div>
      <h4>Liste des agences</h4>
      <p>Gestion des agences et voitures</p>
    </div>

    <a routerLink="/fiche-agence" class="dash-btn-two">
      Ajouter une agence
    </a>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Nom</th>
        <th>Ville</th>
        <th>Manager</th>
        <th>Voitures</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let agence of agences">
        <td>{{ agence.nom }}</td>
        <td>{{ agence.ville }}</td>
        <td>{{ agence.agenceManager?.nom || '-' }}</td>
        <td>{{ agence.voitures?.length || 0 }}</td>

        <td>
          <button class="btn btn-danger btn-sm" (click)="deleteAgence(agence.idagence)">
            Supprimer
          </button>
        </td>
      </tr>
    </tbody>
  </table>

</div>
