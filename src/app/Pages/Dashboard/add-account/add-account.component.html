<app-dashboard-navbar [Title]="'Gestion agences'"></app-dashboard-navbar>

<div class="container mt-3">

  <!-- HEADER -->
  <div class="d-flex justify-content-between mb-3">
    <h3>Gestion des agences</h3>

    <button class="btn btn-primary" (click)="openAddModal()">
      + Ajouter agence
    </button>
  </div>

  <!-- MESSAGE -->
  <div *ngIf="message" class="alert alert-info">
    {{ message }}
  </div>

  <!-- LIST -->
  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let a of agences">

      <div class="card p-2">

        <img *ngIf="a.images?.length"
             [src]="getImageUrl(a.images[0])"
             class="img-fluid mb-2 rounded">

        <h5>{{ a.nom }}</h5>
        <p>{{ a.ville }}</p>

        <button class="btn btn-warning btn-sm"
                (click)="openEditModal(a)">
          Modifier
        </button>

      </div>
    </div>
  </div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal d-block" *ngIf="showModal"
     style="background: rgba(0,0,0,0.5)">

  <div class="modal-dialog modal-lg">
    <div class="modal-content p-3 bg-white card-box border-20">

      <!-- ================= AGENCE ================= -->
      <h4 class="mb-3">Informations agence</h4>

      <div class="row">

        <div class="col-md-6">
          <label>Nom</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="agenceForm.nom">
        </div>

        <div class="col-md-6">
          <label>Ville</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="agenceForm.ville">
        </div>

        <div class="col-md-6">
          <label>Téléphone</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="agenceForm.telephone">
        </div>

        <div class="col-md-6">
          <label>Nombre de voitures</label>
          <input type="number" class="form-control mb-2"
                 name="nombreDeVoitures"
                 [(ngModel)]="agenceForm.nb_Voitures">
        </div>

        <div class="col-md-6">
          <label>Latitude</label>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="agenceForm.latitude">
        </div>

        <div class="col-md-6">
          <label>Longitude</label>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="agenceForm.longitude">
        </div>

      </div>

      <!-- ================= IMAGES ================= -->
      <div class="mt-3">
        <label>Images</label>
        <input type="file" multiple class="form-control mb-2"
               (change)="onFileChange($event)">

        <div class="d-flex flex-wrap gap-2 mt-2">
          <div *ngFor="let file of uploadedFiles"
               class="border p-2 rounded">
            {{ file.name }}
          </div>
        </div>
      </div>

      <!-- ================= VOITURES (modification uniquement) ================= -->
      <div class="mt-4" *ngIf="editMode">

        <h4>Voitures</h4>

        <button class="btn btn-primary mb-3"
                type="button"
                (click)="addVoiture()">
          + Ajouter voiture
        </button>

        <div *ngFor="let v of voitures; let i = index"
             class="border p-3 mb-2 rounded">

          <input [(ngModel)]="v.marque"
                 class="form-control mb-2"
                 placeholder="Marque">

          <input [(ngModel)]="v.modele"
                 class="form-control mb-2"
                 placeholder="Modèle">

          <input [(ngModel)]="v.immatriculation"
                 class="form-control mb-2"
                 placeholder="Immatriculation">

          <select [(ngModel)]="v.etat"
                  class="form-control mb-2">
            <option value="disponible">Disponible</option>
            <option value="louée">Louée</option>
            <option value="maintenance">Maintenance</option>
          </select>

          <input [(ngModel)]="v.prix_Jour"
                 type="number"
                 class="form-control mb-2"
                 placeholder="Prix / jour">

          <button class="btn btn-danger btn-sm"
                  type="button"
                  (click)="removeVoiture(i)">
            Supprimer
          </button>

        </div>

      </div>

      <!-- ================= ACTIONS ================= -->
      <div class="mt-4 d-flex gap-2 justify-content-end">

        <button class="btn btn-success"
                (click)="saveAgence()">
          Enregistrer
        </button>

        <button class="btn btn-secondary"
                (click)="closeModal()">
          Annuler
        </button>

      </div>

    </div>
  </div>
</div>
