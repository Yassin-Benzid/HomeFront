<app-dashboard-navbar [Title]="'Gestion agences'"></app-dashboard-navbar>

<div class="container mt-3">
  <!-- HEADER -->
  <div class="d-flex justify-content-between mb-3">
    <h3>Gestion des agences</h3>
    <button class="btn btn-primary" (click)="openAddModal()">
      + Ajouter agence
    </button>
  </div>

  <!-- MESSAGE -->
  <div *ngIf="message" class="alert alert-info">
    {{ message }}
  </div>

  <!-- LIST -->
  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let a of agences">
      <div class="card p-2 h-100 shadow-sm">

        <img *ngIf="a.images?.length"
             [src]="getImageUrl(a.images[0])"
             class="img-fluid mb-2 rounded">

        <h5 class="mb-1">{{ a.nom }}</h5>
        <p class="text-muted small mb-2">{{ a.ville }}</p>
        <p class="small mb-3">
          <span class="badge bg-light text-dark border">
            {{ a.nb_Voitures ?? a.nb_voitures ?? a['nb-voitures'] ?? 0 }} voiture(s)
          </span>
        </p>

        <div class="d-flex gap-2 mt-auto">
          <button class="btn btn-sm btn-outline-secondary" (click)="openEditModal(a)">
            ✏️ Modifier
          </button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ================= MODAL AGENCE ================= -->
<div class="modal d-block" *ngIf="showModal"
     style="background: rgba(0,0,0,0.5); z-index: 1050;">
  <div class="modal-dialog modal-lg">
    <div class="modal-content p-3 bg-white card-box border-20">
      <h4 class="mb-3">Informations agence</h4>

      <div class="row">

        <div class="col-md-6">
          <label class="form-label">Nom</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="agenceForm.nom">
        </div>

        <div class="col-md-6">
          <label class="form-label">Ville</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="agenceForm.ville">
        </div>

        <div class="col-md-6">
          <label class="form-label">Téléphone</label>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="agenceForm.telephone">
        </div>

        <div class="col-md-6">
          <label class="form-label">Nombre de voitures</label>
          <input type="number" min="0" class="form-control mb-2"
                 name="nombreDeVoitures"
                 [(ngModel)]="agenceForm.nb_Voitures">
        </div>

        <div class="col-md-6">
          <label class="form-label">Latitude</label>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="agenceForm.latitude">
        </div>

        <div class="col-md-6">
          <label class="form-label">Longitude</label>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="agenceForm.longitude">
        </div>

      </div>

      <div class="mt-3">
        <label class="form-label">Images</label>
        <input type="file" multiple class="form-control mb-2"
               (change)="onFileChange($event)">

        <div class="d-flex flex-wrap gap-2 mt-2">
          <div *ngFor="let file of uploadedFiles"
               class="border p-2 rounded small">
            {{ file.name }}
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-3">
        <button class="btn btn-secondary" (click)="closeModal()">Annuler</button>
        <button class="btn btn-primary" (click)="saveAgence()">Enregistrer</button>
      </div>

    </div>
  </div>
</div>
