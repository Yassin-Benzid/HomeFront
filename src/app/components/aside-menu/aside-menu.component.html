<aside class="dash-aside-navbar">
    <div class="position-relative">
        <div class="logo d-md-block d-flex align-items-center justify-content-between plr bottom-line pb-30">
            <a routerLink="/tableau-de-bord">
                <img src="assets/images/logo/logo_01.svg" alt="">
            </a>
            <button class="close-btn d-block d-md-none"><i class="fa-light fa-circle-xmark"></i></button>
        </div>
        <nav class="dasboard-main-nav pt-30 pb-30 bottom-line">
            <ul class="style-none">
                <ng-container *ngFor="let section of currentSections; let sectionIndex = index">
                    <li *ngIf="sectionIndex > 0" class="bottom-line pt-30 lg-pt-20 mb-40 lg-mb-30"></li>
                    <li>
                        <div class="nav-title">{{ section.title }}</div>
                    </li>
                    <li class="plr" *ngFor="let item of section.items">
                        <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="d-flex w-100 align-items-center">
                            <img [src]="isActive(item.route) ? item.activeIcon : item.icon" alt="">
                            <span>{{ item.label }}</span>
                        </a>
                    </li>
                </ng-container>
            </ul>
        </nav>


        

        <div class="plr">
            <a (click)="logout()" href="javascript:void(0);" class="d-flex w-100 align-items-center logout-btn">
                <div class="icon tran3s d-flex align-items-center justify-content-center rounded-circle"><img src="assets/dashboard-images/icon/icon_41.svg" alt=""></div>
                <span>Déconnexion</span>
            </a>
        </div>
    </div>
</aside>
