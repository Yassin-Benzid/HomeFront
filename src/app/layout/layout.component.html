<div class="main-page-wrapper">

    <router-outlet></router-outlet>

    <!-- BACKDROP -->
    <div *ngIf="isBackdropVisible" class="modal-backdrop fade show"></div>

    <!-- MODAL -->
    <div class="modal fade"
         [class.show]="isVisible"
         [ngStyle]="{display: isVisible ? 'block' : 'none'}"
         tabindex="-1"
         aria-hidden="true">

        <div class="modal-dialog modal-fullscreen modal-dialog-centered">
            <div class="container">
                <div class="user-data-form modal-content">

                    <!-- CLOSE -->
                    <button type="button"
                            class="btn-close"
                            (click)="closeModal()"
                            aria-label="Close"></button>

                    <div class="form-wrapper m-auto">

                        <!-- ✅ SUCCESS MESSAGE -->
                        <div *ngIf="successMessage" class="alert alert-success text-center">
                            {{ successMessage }}
                        </div>

                        <!-- ❌ ERROR MESSAGE -->
                        <div *ngIf="errorMessage" class="alert alert-danger text-center">
                            {{ errorMessage }}
                        </div>

                        <!-- TABS -->
                        <ul class="nav nav-tabs w-100" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active"
                                        data-bs-toggle="tab"
                                        data-bs-target="#fc1">
                                    Login
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link"
                                        data-bs-toggle="tab"
                                        data-bs-target="#fc2">
                                    Signup
                                </button>
                            </li>
                        </ul>

                        <div class="tab-content mt-30">

                            <!-- ================= LOGIN ================= -->
                            <div class="tab-pane show active" id="fc1">

                                <div class="text-center mb-20">
                                    <h2>Bon retour</h2>
                                    <p class="fs-20 color-dark">
                                        Pas encore de compte ?
                                        <a href="javascript:void(0);">Sign up</a>
                                    </p>
                                </div>

                                <form>
                                    <div class="row">

                                        <!-- EMAIL -->
                                        <div class="col-12">
                                            <div class="input-group-meta position-relative mb-25">
                                                <label>Email*</label>
                                                <input type="email"
                                                       placeholder="exemple@gmail.com"
                                                       [(ngModel)]="email"
                                                       name="loginEmail">
                                            </div>
                                        </div>

                                        <!-- PASSWORD -->
                                        <div class="col-12">
                                            <div class="input-group-meta position-relative mb-20">
                                                <label>Mot de passe*</label>
                                                <input type="password"
                                                       placeholder="Saisir le mot de passe"
                                                       class="pass_log_id"
                                                       [(ngModel)]="password"
                                                       name="loginPassword">
                                            </div>
                                        </div>

                                        <!-- REMEMBER -->
                                        <div class="col-12">
                                            <div class="agreement-checkbox d-flex justify-content-between align-items-center">
                                                <div>
                                                    <input type="checkbox" id="remember">
                                                    <label for="remember">Rester connecté</label>
                                                </div>
                                                <a href="javascript:void(0);">Mot de passe oublié ?</a>
                                            </div>
                                        </div>

                                        <!-- BUTTON -->
                                        <div class="col-12">
                                            <button class="btn-two w-100 text-uppercase d-block mt-20"
                                                    type="button"
                                                    (click)="onLogin()">
                                                Connexion
                                            </button>
                                        </div>

                                    </div>
                                </form>
                            </div>

                            <!-- ================= REGISTER ================= -->
                            <div class="tab-pane" id="fc2">

                                <div class="text-center mb-20">
                                    <h2>Créer un compte</h2>
                                    <p class="fs-20 color-dark">
                                        Vous avez déjà un compte ?
                                        <a href="javascript:void(0);">Login</a>
                                    </p>
                                </div>

                                <form>
                                    <div class="row">

                                        <!-- NAME -->
                                        <div class="col-12">
                                            <div class="input-group-meta position-relative mb-25">
                                                <label>Nom*</label>
                                                <input type="text"
                                                       placeholder="Nom"
                                                       [(ngModel)]="nom"
                                                       name="nom">
                                            </div>
                                        </div>

                                        <!-- FIRST NAME -->
                                        <div class="col-12">
                                            <div class="input-group-meta position-relative mb-25">
                                                <label>Prénom*</label>
                                                <input type="text"
                                                       placeholder="Prénom"
                                                       [(ngModel)]="prenom"
                                                       name="prenom">
                                            </div>
                                        </div>

                                        <!-- PHONE -->
                                        <div class="col-12">
                                            <div class="input-group-meta position-relative mb-25">
                                                <label>Téléphone*</label>
                                                <input type="text"
                                                       placeholder="Téléphone"
                                                       [(ngModel)]="telephone"
                                                       name="telephone">
                                            </div>
                                        </div>

                                        <!-- EMAIL -->
                                        <div class="col-12">
                                            <div class="input-group-meta position-relative mb-25">
                                                <label>Email*</label>
                                                <input type="email"
                                                       placeholder="exemple@gmail.com"
                                                       [(ngModel)]="email"
                                                       name="registerEmail">
                                            </div>
                                        </div>

                                        <!-- PASSWORD -->
                                        <div class="col-12">
                                            <div class="input-group-meta position-relative mb-20">
                                                <label>Mot de passe*</label>
                                                <input type="password"
                                                       placeholder="Entrer Mot de passe"
                                                       class="pass_log_id"
                                                       [(ngModel)]="password"
                                                       name="registerPassword">
                                            </div>
                                        </div>

                                        <!-- ROLE -->
                                        <div class="input-group-meta mb-25">
                                            <label>Role*</label>
                                            <select class="form-control"
                                                    [(ngModel)]="role"
                                                    name="role">
                                                <option value="" disabled>Choisir un rôle</option>
                                                <option value="client">Client</option>
                                                <option value="hotel-manager">Hotel Manager</option>
                                                <option value="agence-manager">Agence Manager</option>
                                            </select>
                                        </div>

                                        <!-- TERMS -->
                                        <div class="col-12">
                                            <div class="agreement-checkbox d-flex justify-content-between align-items-center">
                                                <div>
                                                    <input type="checkbox" id="remember2">
                                                    <label for="remember2">
                                                        En cliquant sur "Inscription", vous acceptez
                                                        <a href="#">conditions</a> &
                                                        <a href="#">politique de confidentialité</a>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- BUTTON -->
                                        <div class="col-12">
                                            <button class="btn-two w-100 text-uppercase d-block mt-20"
                                                    type="button"
                                                    (click)="onRegister()">
                                                Inscription
                                            </button>
                                        </div>

                                    </div>
                                </form>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCROLL TOP -->
    <button class="scroll-top"
            [ngStyle]="{display: scrollVisible ? 'block' : 'none'}"
            (click)="scrollToTop()">
        <i class="bi bi-arrow-up-short"></i>
    </button>

</div>
