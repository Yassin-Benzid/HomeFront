<header [ngClass]="headerClass">
    <div class="inner-content gap-two">
        <div class="top-header position-relative">
            <div class="d-flex align-items-center">
                <div class="logo order-lg-0">
                    <a routerLink="/" class="d-flex align-items-center">
                        <img src="assets/images/logo/logo_06.svg" alt="">
                    </a>
                </div>
                <div class="right-widget ms-auto me-3 me-lg-0 order-lg-3">
                    <ul class="d-flex align-items-center style-none">
                        <li class="d-none d-md-inline-block me-4">
                            <a routerLink="/add-property" class="btn-ten rounded-0" target="_blank"><span>Add Listing</span> <i class="bi bi-arrow-up-right"></i></a>
                        </li>
                        <li>
                            <a href="javascript:void(0);" (click)="openModal()" class="login-btn-two rounded-circle tran3s d-flex align-items-center justify-content-center"><i class="fa-regular fa-lock"></i></a>
                        </li>
                        <li>
                            <a href="javascript:void(0);" data-bs-toggle="modal" data-bs-target="#searchModal" class="search-btn-one rounded-circle tran3s d-flex align-items-center justify-content-center"><i class="bi bi-search"></i></a>
                        </li>
                    </ul>
                </div>
                <nav class="navbar navbar-expand-lg p0 ms-lg-5 order-lg-2">
                    <button class="navbar-toggler d-block d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span></span>
                    </button>
                    <div class="collapse navbar-collapse ms-xl-5" id="navbarNav">
                        <app-menu-list></app-menu-list>
                    </div>
                </nav>
            </div>
        </div>
    </div>
</header>

<div class="modal fade" id="searchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen modal-dialog-centered">
        <div class="modal-content d-flex justify-content-center">
            <form action="#">
                <input type="text" placeholder="Buy Apartments, Rent Condos, Sell Houses">
                <button><i class="fa-light fa-arrow-right-long"></i></button>
            </form>
        </div>
    </div>
</div>
